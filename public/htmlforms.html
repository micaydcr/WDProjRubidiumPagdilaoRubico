<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<meta charset="UTF-8">
<title>MiCayke Suggestion Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function() {
  emailjs.init("16Z62D3epZ8T0K1M9");
  })();
</script>

<style>
body{
   background: url("https://i.pinimg.com/originals/b8/bd/75/b8bd75128eec43631eb19e9c1bb5adad.gif") no-repeat center center;
   background-size: cover;
   font-family: 'Quicksand', sans-serif;
   text-align:center;
}

.container{
    margin: 60px auto;
    width: 600px;
    background:#ffb6c1cc;
    padding:30px;
    border-radius:20px;
    box-shadow: 5px 5px 10px #b97f91;
}

h1{
    color:white;
    text-shadow:2px 2px 5px #966483;
}

input, textarea{
    width:80%;
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

button{
    margin:10px;
    padding:10px 20px;
    border-radius:10px;
    border:none;
    background:white;
    color:#d88ca0;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
<h1>SUGGESTION FORM</h1>

<form id="suggestionForm">

<input type="text" id="name" placeholder="Your Name" required><br>
<input type="email" id="email" placeholder="Your Email" required><br>
<textarea id="suggestion" rows="5" placeholder="Your Suggestion..." required></textarea><br>

<button type="button" onclick="goHome()">Home</button>
<button type="submit">SUBMIT</button>
<button type="button" onclick="viewResponses()">Responses</button>

</form>
</div>

<script>
function goHome(){
    window.location.href = "../index.html";
}

function viewResponses(){
    window.location.href = "htmlformsresponses.html";
}

document.getElementById("suggestionForm").addEventListener("submit", function(e){
    e.preventDefault();

    let data = JSON.parse(localStorage.getItem("suggestions")) || [];

    const newEntry = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    suggestion: document.getElementById("suggestion").value
    };

    data.push(newEntry);
    localStorage.setItem("suggestions", JSON.stringify(data));

    emailjs.send("service_deoabz4", "template_zdct1m3", {
    name: newEntry.name,
    email: newEntry.email,
    suggestion: newEntry.suggestion,
    action: "NEW SUBMISSION"
    })
    .then(res => console.log("Email sent!", res))
    .catch(err => console.log("Email error:", err));

    alert("Suggestion submitted!");
    this.reset();
});
</script>

</body>
</html>
