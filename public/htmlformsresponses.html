<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<meta charset="UTF-8">
<title>MiCayke Suggestion Form Responses</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("16Z62D3epZ8T0K1M9");
})();
</script>

<style>
body{
   background: url("https://i.pinimg.com/originals/b8/bd/75/b8bd75128eec43631eb19e9c1bb5adad.gif");
   background-size:cover;
   font-family:'Quicksand',sans-serif;
   text-align:center;
}

.container{
    margin:60px auto;
    width:600px;
    background:#ffb6c1cc;
    padding:30px;
    border-radius:20px;
    box-shadow: 5px 5px 10px #b97f91;
}

h1{
    color:white;
    text-shadow:2px 2px 5px #966483;
}

.box{
    background:white;
    margin:12px 0;
    padding:15px;
    border-radius:12px;
    box-shadow:2px 2px 6px #d89aaa;
    text-align:left;
}

.name{
    font-weight:bold;
    color:#d88ca0;
    margin-bottom:5px;
}

.suggestion{
    margin-bottom:10px;
}

button{
    margin:10px;
    padding:10px 20px;
    border-radius:10px;
    border:none;
    background:white;
    color:#d88ca0;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#ffb6c1;
    padding:20px;
    border-radius:15px;
    width:300px;
    box-shadow: 5px 5px 10px #b97f91;
}

.modal-content h3{
    color:white;
    text-shadow:1px 1px 3px #966483;
}

textarea{
    width:90%;
    height:80px;
    border-radius:10px;
    border:none;
    padding:10px;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
<h1>YOUR RESPONSES</h1>

<div id="output"></div>

<button onclick="goBack()">Back to Suggestion Forms</button>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3>Edit Suggestion</h3>
    <textarea id="editInput"></textarea><br>
    <button onclick="saveEdit()">SAVE</button>
    <button onclick="closeModal()">CANCEL</button>
  </div>
</div>

<script>
function goBack(){
    window.location.href = "htmlforms.html";
}

function load(){
    let data = JSON.parse(localStorage.getItem("suggestions")) || [];
    let output = document.getElementById("output");

    output.innerHTML = "";

    data.forEach((item, index)=>{
        output.innerHTML += `
        <div class="box">
            <p><b>${item.name}</b></p>
            <p>${item.suggestion}</p>

            <button onclick="updateItem(${index})">UPDATE</button>
            <button onclick="deleteItem(${index})">DELETE</button>
        </div>
        `;
    });
}

function updateItem(index){
    let data = JSON.parse(localStorage.getItem("suggestions"));

    let newSuggestion = prompt("Edit your suggestion:", data[index].suggestion);

    if(newSuggestion){
        data[index].suggestion = newSuggestion;
        localStorage.setItem("suggestions", JSON.stringify(data));

        emailjs.send("service_deoabz4", "template_zdct1m3", {
            name: data[index].name,
            email: data[index].email,
            suggestion: newSuggestion,
            action: "UPDATED RESPONSE"
        });

        load();
    }
}

function deleteItem(index){
    let data = JSON.parse(localStorage.getItem("suggestions"));

    const deleted = data[index];

    data.splice(index,1);
    localStorage.setItem("suggestions", JSON.stringify(data));

    emailjs.send("service_deoabz4", "template_zdct1m3", {
        name: deleted.name,
        email: deleted.email,
        suggestion: deleted.suggestion,
        action: "DELETED RESPONSE"
    });

    load();
}

window.onload = load;
</script>

</body>
</html>
